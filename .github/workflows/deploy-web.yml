name: Deploy Shelf web

on:
  push:
    branches: [main]
    paths:
      - 'rn-shelf/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rn-shelf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Export web build
        run: npx expo export -p web
        env:
          CI: '1'
          EXPO_NO_TELEMETRY: '1'

      - name: Patch PWA / safe-area HTML
        run: node scripts/patch-web-html.js /shelf '#F4F1EA'

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: rn-shelf/dist
          force_orphan: true
